<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="icon" type="image/png" href="./download.png" class="web-icon">
    <style>
        .main{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .top-bar{
            display: flex;
            justify-content: space-between;
        }
        .logo {
      width: 370px;
      margin-bottom:10px;
    }
    .left-nav{
         display: flex;
        gap: 20px;
        align-items: center;
        list-style-type: none;

    }
    .right-nav{
        display: flex;
        gap: 20px;
        align-items: center;
        list-style-type: none;

    }
    .Gmail {
      width: 20px;
      margin-right: 20px;
    }
    .buttons{
     padding: 10px 18px;
      border: none;
     
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;

    }
    .buttons button{
      
      background-color: transparent;
      border: none;
      border-radius: 8px;
    }
    .search-box {
      background-color: none;
      display: flex;
      width: 550px;
      padding: 12px 15px;
      border-radius: 25px;
      border: 1px solid #dfe1e5;
      outline: none;
      font-size: 20px;
      
    }
    .search-box input{
      background: none;
      height: 100%;
      width: 200px;
      border: none;
      margin-left: 10px;
      margin-right: 200px;
    }
    .search-box button{
      background: none;
      border: none;
    }
    .web-icon{
      padding: 10px 18px;
      border: none;
     
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

     </style>
</head>
<body>
  <div class="top-bar">
    <ul class="left-nav">
      <li>About</li>
      <li>Store</li>
    </ul>
  
    <ul class="right-nav">
      <li>Gmail</li>
      <li>Images</li>
      <li>&#x283f</li>
      <li>🔗</li>
      <li><img src="download (2).png" alt="Apps" class="Gmail"></li>
    </ul>
</div>

<div class="main">
    <img src="download (1).png" alt="Google Logo" class="logo">

    <div class="search-box" >
      <button>🔍</button>
      <input type="text" placeholder=" Search Google ">
      <button>🎤︎︎</button>
      <button>📷 AI Mode</button>

    </div>


    <div class="buttons">
      <button>Google </button>
      <button>▶️ Youtube</button>
    </div>
  </div>
</body>
</html>
