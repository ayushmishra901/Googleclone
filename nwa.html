<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .id{
            background-color: rgb(76, 0, 255);
            width: 500px;
            height: 500px;
            position: relative;  
        }
        .child{
            background-color: rgb(16, 16, 16);
            width: 100px;
            height: 100px;
            position: sticky;
            top: 50px;
            z-index: 2;

        }
        
    </style>
</head>
<body>
    <div class="id"> 
        <div  class="child"></div>
    </div>
    <div class="id"></div>
</body>
</html>
