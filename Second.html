<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Clone</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top Navigation */
    .top-bar {
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      font-size: 14px;
    }

    .top-bar ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
      align-items: center;
    }

    .top-bar li {
      cursor: pointer;
    }

    .top-bar img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }

    /* Main Section */
    .main {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .logo {
      width: 270px;
      margin-bottom: 20px;
    }

    .search-box {
      width: 550px;
      padding: 12px 15px;
      border-radius: 25px;
      border: 1px solid #dfe1e5;
      outline: none;
      font-size: 16px;
    }

    .buttons {
      margin-top: 25px;
      display: flex;
      gap: 15px;
    }

    button {
      padding: 10px 18px;
      border: none;
      background-color: #f8f9fa;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      border: 1px solid #dadce0;
    }
  </style>
</head>

<body>

  <!-- Top Navigation -->
  <div class="top-bar">
    <ul>
      <li>About</li>
      <li>Store</li>
    </ul>

    <ul>
      <li>Gmail</li>
      <li>Images</li>
      <li><img src="download.png" alt="Profile"></li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main">
    <img src="download (1).png" alt="Google Logo" class="logo">

    <input type="text" class="search-box" placeholder="Search Google or type a URL">

    <div class="buttons">
      <button>Google Search</button>
      <button>I'm Feeling Lucky</button>
    </div>
  </div>

</body>
</html>
