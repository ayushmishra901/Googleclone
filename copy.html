<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Google Search </title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top Left */
    .left-nav {
      position: absolute;
      top: 10px;
      left: 20px;
    }

    .left-nav ul {
      list-style: none;
      display: flex;
      gap: 15px;
      padding: 0;
      margin: 0;
      font-size: 13px;
    }

    /* Top Right */
    .top-nav {
      position: absolute;
      top: 10px;
      right: 20px;
    }

    .top-nav ul {
      list-style: none;
      display: flex;
      gap: 15px;
      padding: 0;
      margin: 0;
      font-size: 13px;
      align-items: center;
    }

    .top-nav img {
      height: 35px;
      width: 35px;
      cursor: pointer;
    }

    /* Center */
    .center {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    input {
      width: 400px;
      height: 40px;
      border-radius: 20px;
      border: 1px solid #ccc;
      padding: 0 15px;
      margin-top: 20px;
    }

    button {
      margin: 20px 5px;
      padding: 8px 15px;
      border: none;
      background: #f2f2f2;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- Left -->
  <div class="left-nav">
    <ul>
      <li>About</li>
      <li>Store</li>
    </ul>
  </div>

  <!-- Right -->
  <div class="top-nav">
    <ul>
      <li>Gmail</li>
      <li>Images</li>
      <li><img src="Screenshot 2026-01-27 151236.png" alt="Apps"></li>
    </ul>
  </div>

  <!-- Center -->
  <div class="center">
    <img src="" alt="Google Logo" width="270">

    <form>
      <input type="text" placeholder="Search Google">
      <br>
      <button>Google Search</button>
      <button>I'm Feeling Lucky</button>
    </form>
  </div>

</body>
</html>
