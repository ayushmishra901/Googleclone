<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .head{
            background-color: blue;
            color: white;
            height: 35px;
            text-align: center;
        }
        @keyframes slideRight{
            from{
                transform: translate(-100px);
            }
            to{
                transform: translate(1400px);
            }
        }
        .head{
            display: flex;
            gap: 50px;
        }
        .head p{
            padding-top: 8px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: small;
            animation: slideRight 40s infinite;
            
        }
        .first{
           position: relative;
           height: 950px;
           display: flex;
           overflow: hidden;
           gap: 40px;

        }
        
        @keyframes zoomInOut{
           0%{
            transform: scale(1);
           }
           50%{
            transform: scale(1.1);
           }
           100%{
            transform: scale(1);
           }
    
        }
        .text{
            padding-top: 400px;
            font-size: larger;
            animation: zoomInOut 1.5s ;
            
            
        }
        .text {
            font-size: medium;
        }
        
        #bigtext{
            padding-top: 10px;
            font-size: xx-large;
            
            
            
        }
        #small{
            padding-top: 10px;
        }
        .option{
            display: flex;
            justify-content: space-between;
        }
        .op1 ul{
            list-style-type: none;
            display: flex;
            gap: 20px;
            padding-left: 30px;
             font-weight: bold;
        }
        .op1 li{
            cursor: pointer;
        }
        .op1 li:hover {
    text-decoration: underline;
}
.op2 li:hover {
    text-decoration: underline;
}

.op2 li{
    cursor: pointer;
}
.op2 ul{
     list-style-type: none;
     display: flex;
     gap: 20px;
     padding-right: 30px;
     color: black;
     font-weight: bold;
 }
        
        
.option{
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding-top: 60px;
    color: white;   
}

        
    </style>
</head>
<body>
    
    <header class="head">
        <p>Trusted by 150,00+ User World Wide</p>
        <p>Explore here with an absoulte best choice</p>
    </header>

    <div class="first">
        <img src="obc.png" alt="system" width="1400px" height="1400">
        <div class="text">
            <p>Timeless Essentials , build with purpose</p>
            <p id="bigtext">✔ 365 Days a year</p>
            <p id="small"><u>Shop All</u></p>
        </div>
    </div>
    
    <div class="option">
        <div class="op1">
            <ul>
                <li>ＥＴＱ</li>
                <li>Footwear</li>
                <li>Menswear</li>
                <li>Sales</li>
            </ul>
        </div>
        <div class="op2">
            <ul>
                <li>Search</li>
                <li>Service</li>
                <li>My account</li>
            </ul>
        </div>
    </div>
</body>
</html>
